<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>온리원 메타인지 1분 진단</title>
    <!-- 스타일 및 라이브러리 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide 아이콘 (가장 안정적인 바닐라 버전) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; touch-action: manipulation; }
        .progress-ring { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 아이콘 렌더링용 헬퍼 컴포넌트 (에러 방지용)
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    const iconData = window.lucide.icons[name];
                    if (iconData) {
                        iconRef.current.innerHTML = iconData.toSvg({
                            width: size,
                            height: size,
                            class: className,
                            'stroke-width': 2.5
                        });
                    }
                }
            }, [name, size, className]);
            return <div ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></div>;
        };

        const App = () => {
            const [step, setStep] = useState('welcome');
            const [userInfo, setUserInfo] = useState({ name: '', grade: '초등 3학년' });
            const [currentQ, setCurrentQ] = useState(0);
            const [answers, setAnswers] = useState([]);
            const [progress, setProgress] = useState(0);

            const questions = [
                { id: 1, title: "설명 테스트", q: "아이가 오늘 배운 내용을 엄마한테 1분 안에 설명할 수 있나요?", desc: "단순 암기가 아닌 '완전한 이해' 여부를 확인하는 지표입니다." },
                { id: 2, title: "오답의 이유", q: "틀린 문제를 다시 풀 때, 왜 틀렸는지 이유를 정확히 말하나요?", desc: "'아는 착각'을 잡아내는 자기 객관화 능력을 측정합니다." },
                { id: 3, title: "학습 주도성", q: "오늘 공부할 양과 내용을 아이 스스로 정하고 실천하나요?", desc: "메타인지의 핵심인 '학습 통제권'을 확인합니다." },
                { id: 4, title: "핵심 요약", q: "10분 공부한 내용을 1분 안에 핵심만 요약할 수 있나요?", desc: "정보를 구조화하여 장기기억으로 전환하는 능력입니다." },
                { id: 5, title: "모르는 것 인정", q: "모르는 문제가 나왔을 때 당황하지 않고 '모른다'고 인정하나요?", desc: "자신의 지식 한계를 아는 것이 메타인지의 시작입니다." }
            ];

            const handleAnswer = (val) => {
                const newAnswers = [...answers, val];
                setAnswers(newAnswers);
                if (currentQ < questions.length - 1) {
                    setCurrentQ(currentQ + 1);
                } else {
                    setStep('analyzing');
                }
            };

            useEffect(() => {
                if (step === 'analyzing') {
                    let interval = setInterval(() => {
                        setProgress(prev => {
                            if (prev >= 100) {
                                clearInterval(interval);
                                setTimeout(() => setStep('result'), 800);
                                return 100;
                            }
                            return prev + 5;
                        });
                    }, 50);
                    return () => clearInterval(interval);
                }
            }, [step]);

            const score = answers.filter(a => a === 'YES').length;
            const getResultType = () => {
                if (score >= 4) return { type: "상위 0.1%형", desc: "스스로 학습을 통제하고 인출할 줄 아는 메타인지 마스터!", color: "text-blue-600", bg: "bg-blue-50" };
                if (score >= 2) return { type: "성실한 구경꾼형", desc: "열심히는 하지만 '아는 것'과 '보는 것'을 구분하는 훈련이 필요해요.", color: "text-orange-600", bg: "bg-orange-50" };
                return { type: "착각의 늪형", desc: "강의만 듣고 다 안다고 생각하는 위험한 상태! 학습법 교정이 시급합니다.", color: "text-red-600", bg: "bg-red-50" };
            };

            const resultInfo = getResultType();

            return (
                <div className="flex items-center justify-center min-h-screen p-0 sm:p-4">
                    <div className="relative w-full max-w-[450px] aspect-[9/16] sm:aspect-[3/4.5] bg-white sm:rounded-[3rem] border-0 sm:border-[12px] border-slate-900 shadow-2xl overflow-hidden flex flex-col">
                        
                        {step === 'welcome' && (
                            <div className="h-full flex flex-col items-center justify-center p-8 bg-gradient-to-br from-orange-400 to-orange-600 text-white text-center">
                                <div className="bg-white/20 p-6 rounded-full mb-6 animate-bounce">
                                    <Icon name="brain" size={64} />
                                </div>
                                <h1 className="text-3xl font-black leading-tight mb-6">
                                    우리 아이 성적,<br/>
                                    <span className="text-yellow-200 font-black underline">진짜 공부</span> 중일까?<br/>
                                    <span className="text-yellow-200 font-black">공부 구경</span> 중일까?
                                </h1>
                                <button 
                                    onClick={() => setStep('info')} 
                                    className="w-full py-5 bg-white text-orange-600 rounded-2xl font-black text-xl shadow-2xl flex items-center justify-center gap-2 transform active:scale-95 transition-all"
                                >
                                    진단 시작하기 <Icon name="chevron-right" size={24} />
                                </button>
                                <p className="mt-8 text-sm opacity-80 font-bold tracking-tighter italic">비상교육 온리원 전용 현장 진단 도구</p>
                            </div>
                        )}

                        {step === 'info' && (
                            <div className="h-full flex flex-col p-8 bg-white">
                                <div className="mt-12 mb-10 text-center">
                                    <Icon name="user" size={48} className="text-orange-500 mb-4" />
                                    <h2 className="text-2xl font-black text-slate-800">기본 정보를 알려주세요</h2>
                                </div>
                                <div className="space-y-6">
                                    <input 
                                        type="text" 
                                        placeholder="아이 이름" 
                                        className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none font-bold text-lg focus:border-orange-500" 
                                        onChange={(e)=>setUserInfo({...userInfo, name: e.target.value})} 
                                    />
                                    <select 
                                        className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-lg outline-none focus:border-orange-500" 
                                        onChange={(e)=>setUserInfo({...userInfo, grade: e.target.value})}
                                    >
                                        <option>초등 1~2학년</option>
                                        <option>초등 3학년</option>
                                        <option>초등 4학년</option>
                                        <option>초등 5학년</option>
                                        <option>초등 6학년</option>
                                    </select>
                                    <button 
                                        onClick={()=>setStep('quiz')} 
                                        className="w-full py-5 bg-orange-500 text-white rounded-2xl font-black text-xl shadow-lg transform active:scale-95 transition-all mt-6"
                                    >
                                        준비 완료!
                                    </button>
                                </div>
                            </div>
                        )}

                        {step === 'quiz' && (
                            <div className="h-full flex flex-col bg-white">
                                <div className="p-6 bg-slate-50 border-b flex justify-between items-center">
                                    <div className="flex flex-col">
                                        <span className="text-[11px] font-black text-orange-500 tracking-widest mb-1 uppercase">진행상황</span>
                                        <h3 className="text-lg font-black text-slate-800">{questions[currentQ].title}</h3>
                                    </div>
                                    <span className="bg-orange-500 px-4 py-1 rounded-full text-white font-black text-sm">
                                        {currentQ+1} / 5
                                    </span>
                                </div>
                                <div className="flex-grow flex flex-col items-center justify-center p-8 text-center">
                                    <h4 className="text-2xl font-black text-slate-800 mb-6 leading-tight">
                                        "{questions[currentQ].q}"
                                    </h4>
                                    <div className="p-4 bg-orange-50 rounded-2xl border border-orange-100">
                                        <p className="text-orange-700 font-bold text-sm leading-relaxed">
                                            {questions[currentQ].desc}
                                        </p>
                                    </div>
                                </div>
                                <div className="p-8 grid grid-cols-2 gap-4">
                                    <button 
                                        onClick={() => handleAnswer('YES')} 
                                        className="py-8 bg-orange-500 text-white rounded-3xl font-black text-2xl border-b-8 border-orange-700 active:translate-y-1 active:border-b-0"
                                    >
                                        그렇다
                                    </button>
                                    <button 
                                        onClick={() => handleAnswer('NO')} 
                                        className="py-8 bg-slate-100 text-slate-400 rounded-3xl font-black text-2xl border-b-8 border-slate-200 active:translate-y-1 active:border-b-0"
                                    >
                                        아니다
                                    </button>
                                </div>
                            </div>
                        )}

                        {step === 'analyzing' && (
                            <div className="h-full flex flex-col items-center justify-center p-8 text-center bg-white">
                                <div className="relative w-40 h-40 mb-8 flex items-center justify-center">
                                    <svg className="absolute w-full h-full">
                                        <circle cx="80" cy="80" r="75" stroke="#f1f5f9" strokeWidth="10" fill="transparent" />
                                        <circle 
                                            cx="80" cy="80" r="75" stroke="#f97316" strokeWidth="10" fill="transparent" 
                                            strokeDasharray="471" strokeDashoffset={471 - (471 * progress / 100)}
                                            className="progress-ring"
                                        />
                                    </svg>
                                    <span className="text-4xl font-black text-orange-500">{progress}%</span>
                                </div>
                                <h3 className="text-2xl font-black text-slate-800 mb-2">데이터 판독 중...</h3>
                                <p className="text-slate-400 font-bold">우리 아이의 '진짜 실력' 수치를 산출하고 있습니다.</p>
                            </div>
                        )}

                        {step === 'result' && (
                            <div className="h-full flex flex-col bg-white overflow-y-auto">
                                <div className="bg-slate-900 p-10 text-white text-center rounded-b-[2rem] shadow-xl">
                                    <Icon name="bar-chart-3" size={48} className="text-orange-400 mb-4 mx-auto" />
                                    <h2 className="text-xl font-bold mb-2 opacity-80">{userInfo.name} 학생 진단 결과</h2>
                                    <div className="text-5xl font-black text-yellow-300 tracking-tighter">메타인지 {score*20}점</div>
                                </div>
                                <div className="p-8">
                                    <div className={`rounded-3xl p-6 ${resultInfo.bg} border-2 border-white shadow-lg mb-8`}>
                                        <h3 className={`text-2xl font-black mb-3 ${resultInfo.color}`}>{resultInfo.type}</h3>
                                        <p className="font-bold text-slate-700 leading-relaxed text-lg">{resultInfo.desc}</p>
                                    </div>
                                    <button 
                                        onClick={()=>setStep('lead')} 
                                        className="w-full py-5 bg-orange-500 text-white rounded-2xl font-black text-xl shadow-xl flex items-center justify-center gap-2 transform active:scale-95 transition-all"
                                    >
                                        전문가 상세 분석 신청 <Icon name="arrow-right" size={24} />
                                    </button>
                                </div>
                            </div>
                        )}

                        {step === 'lead' && (
                            <div className="h-full flex flex-col p-8 bg-white text-center">
                                <div className="mt-12 mb-8">
                                    <Icon name="message-circle" size={48} className="text-blue-500 mb-4 mx-auto" />
                                    <h3 className="text-2xl font-black text-slate-800">정밀 진단 예약</h3>
                                    <p className="text-slate-400 font-bold mt-3 leading-tight">
                                        분석 결과와 함께 '진짜 공부'를 위한<br/>맞춤 처방 로드맵을 보내드립니다.
                                    </p>
                                </div>
                                <div className="space-y-4">
                                    <input 
                                        type="tel" 
                                        placeholder="연락처 (010-0000-0000)" 
                                        className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl font-black text-lg outline-none focus:border-blue-500" 
                                    />
                                    <button 
                                        className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-xl shadow-xl transform active:scale-95 transition-all"
                                    >
                                        무료 상담 예약 완료
                                    </button>
                                    <button 
                                        onClick={() => setStep('welcome')}
                                        className="text-slate-400 font-bold text-sm underline mt-6 opacity-70"
                                    >
                                        다시 진단하기
                                    </button>
                                </div>
                            </div>
                        )}

                        <div className="h-6 w-full flex justify-center items-end pb-3">
                            <div className="w-24 h-1.5 rounded-full bg-slate-200"></div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
